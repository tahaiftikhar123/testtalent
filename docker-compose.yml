services:
  backend:
    build: ./backend
    container_name: talent_backend
    restart: always

    env_file:
      - ./backend/.env

    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: talent_frontend
    restart: always

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api

    depends_on:
      - backend